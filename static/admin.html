<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artwork Admin Console</title>
    <!-- Cropper.js CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
    <!-- Sortable.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --sidebar-bg: #1e293b;
            --accent-color: #3b82f6;
            --success-color: #10b981;
            --text-color: #f1f5f9;
            --border-color: #334155;
            --card-bg: #1e293b;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* Sidebar Styling */
        aside {
            width: 320px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        h1 { font-size: 1.25rem; margin-bottom: 30px; color: var(--accent-color); }
        h2 { font-size: 0.9rem; text-transform: uppercase; color: #94a3b8; margin-top: 20px; display: flex; justify-content: space-between; align-items: center; }

        .nav-tabs { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .nav-btn {
            background: transparent; border: 1px solid var(--border-color);
            color: var(--text-color); padding: 12px; border-radius: 8px;
            text-align: left; cursor: pointer; transition: all 0.2s;
        }
        .nav-btn.active { background: var(--accent-color); border-color: var(--accent-color); }
        .nav-btn .badge { 
            float: right; background: rgba(0,0,0,0.3); padding: 2px 8px; 
            border-radius: 10px; font-size: 0.75rem; 
        }

        .playlist-list { list-style: none; padding: 0; flex-grow: 1; overflow-y: auto; }
        .playlist-item {
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.02);
        }
        .playlist-item:hover { background: rgba(255, 255, 255, 0.05); }
        .playlist-item.active { border-color: var(--accent-color); background: rgba(59, 130, 246, 0.1); }

        .playlist-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
        .playlist-meta label { font-size: 0.7rem; color: #94a3b8; }
        .playlist-meta input { 
            width: 50px; background: #0f172a; border: 1px solid var(--border-color); 
            color: white; font-size: 0.75rem; padding: 2px 4px; border-radius: 4px;
        }

        .new-playlist { margin-top: 20px; display: flex; gap: 10px; }
        .new-playlist input {
            background: #0f172a;
            border: 1px solid var(--border-color);
            color: white;
            padding: 8px;
            border-radius: 6px;
            width: 100%;
        }

        /* Main Content */
        main { flex-grow: 1; padding: 40px; overflow-y: auto; }

        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

        .upload-zone {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            flex-grow: 1;
            transition: border-color 0.2s;
            cursor: pointer;
        }
        .upload-zone:hover { border-color: var(--accent-color); }
        
        .artwork-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .artwork-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            position: relative;
        }
        .artwork-card img { width: 100%; height: 180px; object-fit: cover; }
        .artwork-card .info { padding: 15px; font-size: 0.85rem; }
        .artwork-card .actions { 
            position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; 
        }
        .artwork-card button {
            background: rgba(0,0,0,0.6);
            border: none;
            color: white;
            padding: 5px 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Review Queue Styling */
        .review-card {
            display: flex;
            gap: 30px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
        }
        .review-image { width: 300px; flex-shrink: 0; }
        .review-image img { width: 100%; border-radius: 8px; }
        .review-form { flex-grow: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group.full { grid-column: span 2; }
        .form-group label { font-size: 0.75rem; text-transform: uppercase; color: #94a3b8; }
        .form-group input, .form-group textarea {
            background: #0f172a; border: 1px solid var(--border-color);
            color: white; padding: 10px; border-radius: 6px; font-family: inherit;
        }
        .review-actions { grid-column: span 2; display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }

        .hidden { display: none !important; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            max-width: 90%;
            max-height: 90%;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .cropper-container { max-width: 800px; max-height: 500px; }
        .modal-header { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .modal-footer { margin-top: 20px; display: flex; justify-content: flex-end; gap: 15px; }

        button.primary { background: var(--accent-color); border: none; color: white; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
        button.success { background: var(--success-color); border: none; color: white; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button.secondary { background: transparent; border: 1px solid var(--border-color); color: white; padding: 10px 20px; border-radius: 6px; cursor: pointer; }

        /* Library Picker */
        .library-picker-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            max-width: 800px;
        }
        .picker-card {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .picker-card:hover { transform: scale(1.05); }
        .picker-card img { width: 100%; height: 100px; object-fit: cover; }
        .picker-card p { font-size: 0.7rem; padding: 5px; text-align: center; margin: 0; }
    </style>
</head>
<body>
    <aside>
        <h1>Art Engine Admin</h1>
        
        <div class="nav-tabs">
            <button id="nav-library" class="nav-btn" onclick="switchView('library')">
                Full Library <span id="library-count" class="badge">0</span>
            </button>
            <button id="nav-playlists" class="nav-btn active" onclick="switchView('playlists')">
                Collections <span id="playlist-count" class="badge">0</span>
            </button>
            <button id="nav-review" class="nav-btn" onclick="switchView('review')">
                Review Queue <span id="review-count" class="badge">0</span>
            </button>
        </div>

        <div id="sidebar-playlists">
            <h2>Playlists</h2>
            <ul id="playlist-list" class="playlist-list"></ul>
            <div class="new-playlist">
                <input type="text" id="new-playlist-name" placeholder="New Playlist Name...">
                <button onclick="createPlaylist()">+</button>
            </div>
        </div>
    </aside>

    <main>
        <!-- Library View -->
        <div id="view-library" class="hidden">
            <div class="action-bar">
                <div id="library-upload-zone" class="upload-zone" onclick="document.getElementById('library-file-input').click()">
                    Drag & Drop or Click to Add to Library
                    <input type="file" id="library-file-input" hidden multiple onchange="uploadFiles(this.files, null)">
                </div>
            </div>
            <div id="library-grid" class="artwork-grid"></div>
        </div>

        <!-- Playlist Management View -->
        <div id="view-playlists">
            <div class="action-bar">
                <div id="upload-zone" class="upload-zone">
                    Upload New to <span id="target-playlist-name">None</span>
                    <input type="file" id="file-input" hidden multiple>
                </div>
                <button class="primary" style="margin-left: 20px;" onclick="openLibraryPicker()">Add from Library</button>
            </div>
            <div id="artwork-grid" class="artwork-grid"></div>
        </div>

        <!-- Review Queue View -->
        <div id="view-review" class="hidden">
            <div id="review-list"></div>
        </div>
    </main>

    <!-- Cropping Modal -->
    <div id="crop-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Define Static Crop</h3>
                <div class="ratio-buttons">
                    <button onclick="setRatio(16/9, this)">16:9</button>
                    <button onclick="setRatio(9/16, this)">9:16</button>
                    <button onclick="setRatio(NaN, this)" class="active">Freeform</button>
                </div>
            </div>
            <div class="cropper-container">
                <img id="cropper-image" src="">
            </div>
            <div class="modal-footer">
                <button class="secondary" onclick="closeModal()">Cancel</button>
                <button class="primary" onclick="saveCrop()">Save Crop Settings</button>
            </div>
        </div>
    </div>

    <!-- Library Picker Modal -->
    <div id="library-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Select Artwork from Library</h3>
                <button class="secondary" onclick="closeLibraryPicker()">×</button>
            </div>
            <div id="library-picker-grid" class="library-picker-grid"></div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
